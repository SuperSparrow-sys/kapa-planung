<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>regenery Kapa-Planung</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<!-- Icon-Sprites -->
<svg style="display:none">
  <symbol id="icon-calendar" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="5" width="18" height="16" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="3" x2="8" y2="7"/><line x1="16" y1="3" x2="16" y2="7"/>
  </symbol>
  <symbol id="icon-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
  </symbol>
  <symbol id="icon-trash" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
  </symbol>
  <symbol id="icon-person" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-7 8-7s8 2.6 8 7"/>
  </symbol>
  <symbol id="icon-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/>
  </symbol>
  <symbol id="icon-target" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1"/>
  </symbol>
  <symbol id="icon-pencil" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>
  </symbol>
  <symbol id="icon-gear" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3"/>
    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/>
  </symbol>
  <symbol id="icon-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="9 6 15 12 9 18"/>
  </symbol>
</svg>

<!-- Toast-Container -->
<div id="toast-container" class="toast-container"></div>

<div class="app">

  {% include '_sidebar.html' %}

  <main class="main">
    <div class="topbar">
      <h1>Kapazitätsplanung</h1>
      <div class="topbar-actions">
        <button id="btn-undo" class="icon-btn btn-undo" title="Rückgängig" disabled>
          <i data-lucide="undo-2" class="icon-sm"></i>
        </button>
        <button id="btn-redo" class="icon-btn btn-redo" title="Wiederherstellen" disabled>
          <i data-lucide="redo-2" class="icon-sm"></i>
        </button>
        <button id="btn-today" class="btn-text-icon">
          <svg class="icon-sm"><use href="#icon-target"/></svg>
          Heute ({{ current_label }})
        </button>
        <button id="btn-settings" class="icon-btn btn-settings" title="Einstellungen">
          <svg class="icon-sm"><use href="#icon-gear"/></svg>
        </button>
      </div>
    </div>

    {% include '_gantt.html' %}
  </main>
</div>

<!-- Modal: Stunden eintragen -->
<div id="modal-overlay" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modal-project-name"></div>
        <div class="modal-subtitle" id="modal-subtitle"></div>
      </div>
      <button id="modal-close" class="icon-btn">
        <svg class="icon-sm"><use href="#icon-close"/></svg>
      </button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <button id="modal-cancel" class="btn-text">Abbrechen</button>
      <button id="modal-save" class="btn-primary">Speichern</button>
    </div>
  </div>
</div>

<!-- Modal: Projekt / Teilschritt bearbeiten -->
<div id="edit-modal-overlay" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="edit-modal-title">Projekt bearbeiten</div>
      </div>
      <button id="edit-modal-close" class="icon-btn">
        <svg class="icon-sm"><use href="#icon-close"/></svg>
      </button>
    </div>
    <div class="modal-body edit-modal-body">
      <label>Name
        <input type="text" id="em-name" required>
      </label>
      <label>Start-Quartal
        <select id="em-start">
          {% for opt in quarter_options %}
          <option value="{{ opt.year }}-{{ opt.q }}">{{ opt.label }}</option>
          {% endfor %}
        </select>
      </label>
      <label>Dauer (Quartale)
        <input type="number" id="em-duration" min="1" required>
      </label>
    </div>
    <div class="modal-footer modal-footer-split">
      <button id="edit-modal-delete" class="btn-text btn-text-danger">Löschen</button>
      <div class="modal-footer-right">
        <button id="edit-modal-cancel" class="btn-text">Abbrechen</button>
        <button id="edit-modal-save" class="btn-primary">Speichern</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal: Einstellungen -->
<div id="settings-modal-overlay" class="modal-overlay hidden">
  <div class="modal modal-wide">
    <div class="modal-header">
      <div>
        <div class="modal-title">Einstellungen</div>
        <div class="modal-subtitle">Mitarbeiter &amp; max. Stunden pro Quartal</div>
      </div>
      <button id="settings-modal-close" class="icon-btn">
        <svg class="icon-sm"><use href="#icon-close"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div id="settings-member-list" class="settings-member-list">
        {% for m in members %}
        <div class="settings-member-item" data-member-id="{{ m.id }}">
          <svg class="icon-sm"><use href="#icon-person"/></svg>
          <span class="settings-member-name">{{ m.name }}</span>
          <span class="settings-member-maxstunden">
            <input type="number" min="0" step="0.5" class="settings-max-stunden-input"
                   data-member-id="{{ m.id }}"
                   value="{{ m.max_stunden_quarter if m.max_stunden_quarter is not none else '' }}"
                   placeholder="auto: {{ member_defaults[m.id]|round(0) }}">
            <span class="settings-unit">h/Q.</span>
          </span>
          <button class="icon-btn btn-delete-member" data-member-id="{{ m.id }}" title="Mitarbeiter entfernen">
            <svg class="icon-sm"><use href="#icon-trash"/></svg>
          </button>
        </div>
        {% endfor %}
      </div>
      <div class="settings-add-member">
        <input type="text" id="settings-new-member-name" placeholder="Name des Mitarbeiters">
        <input type="number" min="0" step="0.5" id="settings-new-member-maxstunden" placeholder="Max. h/Q.">
        <button id="settings-add-member-btn" class="btn-primary">Hinzufügen</button>
      </div>
      <div class="settings-backup">
        <button id="btn-backup-now" class="btn-text">Backup jetzt erstellen</button>
        <span id="backup-status" class="settings-backup-status"></span>
      </div>
    </div>
    <div class="modal-footer">
      <button id="settings-modal-done" class="btn-text">Fertig</button>
    </div>
  </div>
</div>

<script id="app-data" type="application/json">
{
  "quarter_options": {{ quarter_options|tojson }},
  "members": {{ members|tojson }},
  "member_defaults": {{ member_defaults|tojson }}
}
</script>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
